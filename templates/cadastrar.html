<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Cadastrar Produto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#0f172a;
            color:white;
            min-height:100vh;
        }

        .card{
            background:#1e293b;
            border:none;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        h1{
            color:white;
            font-weight:700;
        }

        label{
            color:#e2e8f0;
            font-weight:600;
            margin-bottom:8px;
        }

        .form-control{
            background:#334155;
            border:1px solid #475569;
            color:white;
            padding:12px;
        }

        .form-control:focus{
            background:#334155;
            color:white;
            border-color:#3b82f6;
            box-shadow:0 0 10px rgba(59,130,246,0.3);
        }

        .form-control::placeholder{
            color:#cbd5e1;
        }

        textarea{
            resize:none;
        }

    </style>

</head>

<body>

<div class="container mt-5 mb-5">

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <div class="card p-5">

                <h1 class="mb-4">
                    Cadastro de Produto
                </h1>

                <form method="POST">

                    <div class="mb-3">

                        <label>
                            Nome do Produto
                        </label>

                        <input
                            type="text"
                            name="nome"
                            class="form-control"
                            placeholder="Ex: Notebook Dell"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>
                            Descrição
                        </label>

                        <textarea
                            name="descricao"
                            class="form-control"
                            rows="4"
                            placeholder="Descrição do produto"
                            required></textarea>

                    </div>

                    <div class="mb-3">

                        <label>
                            Preço
                        </label>

                        <input
                            type="number"
                            step="0.01"
                            name="preco"
                            class="form-control"
                            placeholder="Ex: 3500"
                            required>

                    </div>

                    <div class="mb-4">

                        <label>
                            Estoque
                        </label>

                        <input
                            type="number"
                            name="estoque"
                            class="form-control"
                            placeholder="Ex: 15"
                            required>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-success w-100">

                        Salvar Produto

                    </button>

                </form>

                <a href="/"
                   class="btn btn-outline-light mt-3">

                    Voltar para a Loja

                </a>

            </div>

        </div>

    </div>

</div>

</body>

</html>
