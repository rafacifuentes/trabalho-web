<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Editar Produto</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

body{
    background:#0f172a;
    color:white;
}

.card{
    background:#1e293b;
    border:none;
    border-radius:20px;
}

.form-control{
    background:#334155;
    border:none;
    color:white;
}

.form-control:focus{
    background:#475569;
    color:white;
    box-shadow:none;
}

</style>

</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card p-5">

                <h1 class="mb-4">
                    Editar Produto
                </h1>

                <form method="POST">

                    <label class="mb-2">
                        Nome do Produto
                    </label>

                    <input
                        type="text"
                        name="nome"
                        class="form-control mb-3"
                        value="{{ produto[1] }}"
                        required>

                    <label class="mb-2">
                        Descrição
                    </label>

                    <textarea
                        name="descricao"
                        class="form-control mb-3"
                        rows="4"
                        required>{{ produto[2] }}</textarea>

                    <label class="mb-2">
                        Preço
                    </label>

                    <input
                        type="number"
                        step="0.01"
                        name="preco"
                        class="form-control mb-3"
                        value="{{ produto[3] }}"
                        required>

                    <label class="mb-2">
                        Estoque
                    </label>

                    <input
                        type="number"
                        name="estoque"
                        class="form-control mb-4"
                        value="{{ produto[4] }}"
                        required>

                    <button
                        type="submit"
                        class="btn btn-success w-100">

                        Salvar Alterações

                    </button>

                </form>

                <a href="/"
                   class="btn btn-outline-light mt-3">

                    Voltar para a Loja

                </a>

            </div>

        </div>

    </div>

</div>

</body>

</html>
