<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Dashboard - Lojas IFTO</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#0f172a;
            color:white;
        }

        .card{
            background:#1e293b;
            border:none;
            border-radius:15px;
            color:white;
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .valor{
            font-size:32px;
            font-weight:bold;
            color:#22c55e;
        }

        .navbar{
            background:#020617;
            border-bottom:1px solid #1e293b;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

    <div class="container">

        <a class="navbar-brand fw-bold"
           href="/">
            Lojas IFTO
        </a>

        <a href="/"
           class="btn btn-primary">
            Voltar
        </a>

    </div>

</nav>

<div class="container mt-5">

    <h1 class="mb-5">
        Dashboard
    </h1>

    <div class="row">

        <div class="col-md-6 mb-4">

            <div class="card p-4">

                <h5>Total de Produtos</h5>

                <div class="valor">
                    {{ total_produtos }}
                </div>

            </div>

        </div>

        <div class="col-md-6 mb-4">

            <div class="card p-4">

                <h5>Valor Total em Estoque</h5>

                <div class="valor">
                    R$ {{ "%.2f"|format(valor_total) }}
                </div>

            </div>

        </div>

        <div class="col-md-6 mb-4">

            <div class="card p-4">

                <h5>Produto Mais Caro</h5>

                <div class="valor">
                    {{ produto_caro }}
                </div>

            </div>

        </div>

        <div class="col-md-6 mb-4">

            <div class="card p-4">

                <h5>Produto Mais Barato</h5>

                <div class="valor">
                    {{ produto_barato }}
                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
